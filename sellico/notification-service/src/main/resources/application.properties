spring.application.name=notification-service
spring.config.import=optional:configserver:http://config-server:8888

# Flyway configuration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
# Allow Flyway to run even if there are validation errors (useful when manual changes were made)
spring.flyway.validate-on-migrate=false

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-service:8761/eureka/}
eureka.instance.prefer-ip-address=true
