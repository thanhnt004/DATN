spring.application.name=identity-service
spring.config.import=optional:configserver:http://config-server:8888

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-service:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Resilience4j Retry configuration
resilience4j.retry.instances.profileRetry.max-attempts=2
resilience4j.retry.instances.profileRetry.wait-duration=500ms
resilience4j.retry.instances.profileRetry.retry-exceptions=java.io.IOException,feign.RetryableException
resilience4j.retry.instances.profileRetry.ignore-exceptions=org.example.identityservice.exception.ExternalServiceException

# Override shared default config (remote repo has invalid package name as exception class)
resilience4j.retry.configs.default.ignore-exceptions[0]=org.example.identityservice.exception.KeycloakException
resilience4j.retry.configs.default.ignore-exceptions[1]=feign.FeignException.BadRequest
resilience4j.retry.configs.default.ignore-exceptions[2]=feign.FeignException.Unauthorized
resilience4j.retry.configs.default.ignore-exceptions[3]=feign.FeignException.Forbidden
resilience4j.retry.configs.default.ignore-exceptions[4]=feign.FeignException.NotFound


