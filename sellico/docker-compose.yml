
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - microservice-network

  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    environment:
      # Chế độ KRaft không cần Zookeeper
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      # Enable classic consumer group protocol for compatibility with Kafka client 3.7.x
      KAFKA_GROUP_COORDINATOR_REBALANCE_PROTOCOLS: 'classic,consumer'
      # Single-broker: set replication factors to 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Tạo ID cho cụm Kafka (có thể dùng chuỗi ngẫu nhiên bất kỳ)
      KAFKA_KRAFT_CLUSTER_ID: '6L6vG_mSRuyC-D3_H7IunQ'
    networks:
      - microservice-network

  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - microservice-network
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - microservice-network
  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: postgres
    restart: unless-stopped
    command: postgres -c max_connections=300
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com # Email để đăng nhập pgAdmin
      PGADMIN_DEFAULT_PASSWORD: admin        # Mật khẩu để đăng nhập pgAdmin
      PGADMIN_CONFIG_SERVER_MODE: "False"    # Chế độ đơn giản cho môi trường dev
    ports:
      - "5050:80"                            # Truy cập tại http://localhost:5050
    networks:
      - microservice-network
    depends_on:
      postgres:
        condition: service_healthy
  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-23.0.0}
    container_name: keycloak
    restart: unless-stopped
    command: start-dev
    dns:
      - 8.8.8.8
      - 1.1.1.1
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    environment:
      # Cấu hình Database cho Keycloak
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Cấu hình Admin
      KEYCLOAK_ADMIN: ${KEYCLOAK_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD:-admin}
      # Cho phép Keycloak chạy phía sau Gateway/Proxy (nếu cần)
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "7080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - microservice-network

  config-server:
    build:
      context: .
      args:
        SERVICE_NAME: config-server
    container_name: config-server
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - ../config:/config
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s # Cho Java 45s khởi động trước khi bắt đầu check
    networks:
      - microservice-network

  discovery-service:
    build:
      context: .
      args:
        SERVICE_NAME: discovery-service
    container_name: discovery-service
    restart: unless-stopped
    ports:
      - "8761:8761"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/eureka/apps || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    environment:
        SPRING_PROFILES_ACTIVE: docker
        EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
        SPRING_CLOUD_CONFIG_URI: http://config-server:8888
    networks:
      - microservice-network

  user-service:
    build:
      context: .
      args:
        SERVICE_NAME: user-service
    container_name: user-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/ecommerce/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:7080/realms/ecommerce
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
    networks:
      - microservice-network

  identity-service:
    build:
      context: .
      args:
        SERVICE_NAME: identity-service
    container_name: identity-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      APP_KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      APP_KEYCLOAK_PUBLIC_URL: http://localhost:7080
      APP_GOOGLE_CALLBACK_URL: http://localhost:8088/api/v1/identity/auth/google/callback
      APP_GOOGLE_FRONTEND_SUCCESS_URL: http://localhost:5173/oauth/callback
      APP_GOOGLE_FRONTEND_ERROR_URL: http://localhost:5173/login
      APP_FACEBOOK_CALLBACK_URL: http://localhost:8088/api/v1/identity/auth/facebook/callback
      APP_FACEBOOK_FRONTEND_SUCCESS_URL: http://localhost:5173/oauth/callback
      APP_FACEBOOK_FRONTEND_ERROR_URL: http://localhost:5173/login
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      RESILIENCE4J_RETRY_CONFIGS_DEFAULT_IGNOREEXCEPTIONS_0: org.example.identityservice.exception.KeycloakException
      RESILIENCE4J_RETRY_CONFIGS_DEFAULT_IGNOREEXCEPTIONS_1: feign.FeignException$$BadRequest
      RESILIENCE4J_RETRY_CONFIGS_DEFAULT_IGNOREEXCEPTIONS_2: feign.FeignException$$Unauthorized
      RESILIENCE4J_RETRY_CONFIGS_DEFAULT_IGNOREEXCEPTIONS_3: feign.FeignException$$Forbidden
      RESILIENCE4J_RETRY_CONFIGS_DEFAULT_IGNOREEXCEPTIONS_4: feign.FeignException$$NotFound
    networks:
      - microservice-network

  notification-service:
    build:
      context: .
      args:
        SERVICE_NAME: notification-service
    container_name: notification-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_USERNAME: ${BREVO_USERNAME}
      BREVO_PASSWORD: ${BREVO_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
    networks:
      - microservice-network

  api-gateway:
    build:
      context: .
      args:
        SERVICE_NAME: api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8088:8080"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      discovery-service:
        condition: service_healthy
      config-server:
        condition: service_healthy
    # Gateway không nên đợi toàn bộ service con vì sẽ dễ gây treo cả hệ thống
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:4173
    networks:
      - microservice-network

  product-service:
    build:
      context: .
      args:
        SERVICE_NAME: product-service
    container_name: product-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
    networks:
      - microservice-network

